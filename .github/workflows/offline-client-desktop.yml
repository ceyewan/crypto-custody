name: Offline Client Desktop

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: offline-client-wails-darwin-arm64
            wails_args: -platform darwin/arm64
          - os: ubuntu-24.04
            artifact: offline-client-wails-linux-amd64
            wails_args: -platform linux/amd64 -tags webkit2_41
          - os: windows-latest
            artifact: offline-client-wails-windows-amd64-installer
            wails_args: -platform windows/amd64 -nsis -webview2 embed

    defaults:
      run:
        shell: bash
        working-directory: offline-client/offline-client-wails

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.3"
          cache-dependency-path: offline-client/offline-client-wails/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: offline-client/offline-client-wails/frontend/package-lock.json

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libpcsclite-dev pcscd

      - name: Install Windows installer dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: .
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: offline-client/offline-client-wails/frontend

      - name: Build frontend
        run: npm run build
        working-directory: offline-client/offline-client-wails/frontend

      - name: Test Go code
        run: go test ./...

      - name: Build desktop app
        run: wails build -clean ${{ matrix.wails_args }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: offline-client/offline-client-wails/build/bin/**
          if-no-files-found: error
